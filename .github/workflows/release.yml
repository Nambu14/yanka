name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.3.0 — no leading v)
        required: true
        type: string
      publish:
        description: Publish the GitHub Release immediately. If false, leaves a draft for you to review.
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build release bundle
        run: python scripts/build_release.py --version "${{ inputs.version }}"

      - name: Upload platform bundle
        uses: actions/upload-artifact@v7
        with:
          name: yanka-${{ inputs.version }}-${{ matrix.label }}
          path: release/
          if-no-files-found: error

      - name: Upload sdist and wheel (Linux)
        if: matrix.label == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: yanka-${{ inputs.version }}-sdist
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: yanka-${{ inputs.version }}-*
          merge-multiple: true

      - name: Collect release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p upload
          # Homebrew formula expects this exact asset on the GitHub Release page.
          find artifacts -type f -name "yanka-${VERSION}.tar.gz" -exec cp -v {} upload/ \;
          find artifacts -type f -name "yanka-${VERSION}-py3-none-any.whl" -exec cp -v {} upload/ \;
          # Optional platform bundles (sdist + wheel also live inside each).
          find artifacts -type f -name "yanka-${VERSION}-*.tar.gz" ! -name "yanka-${VERSION}.tar.gz" -exec cp -v {} upload/ \;
          find artifacts -type f -name "yanka-${VERSION}-*.zip" -exec cp -v {} upload/ \;
          test -f "upload/yanka-${VERSION}.tar.gz"
          ls -la upload/

      - name: Create GitHub Release
        # Creates and pushes tag v<version> at the current main commit, then
        # attaches the assets. Tags are not blocked by branch protection, so this
        # needs no commit to main and no bypass.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          name: yanka v${{ inputs.version }}
          draft: ${{ !inputs.publish }}
          generate_release_notes: true
          files: upload/*

  publish-pypi:
    if: inputs.publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yanka/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: yanka-${{ inputs.version }}-sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
