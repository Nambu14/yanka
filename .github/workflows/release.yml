name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.2.0 — no leading v)
        required: true
        type: string
      publish:
        description: Publish the GitHub Release immediately (creates tag v*). If false, leaves a draft for you to review.
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    name: bump version on main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version in pyproject.toml
        run: python scripts/set_version.py "${{ inputs.version }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pyproject.toml; then
            echo "pyproject.toml already at ${{ inputs.version }}"
          else
            git add pyproject.toml
            git commit -m "chore(release): bump version to ${{ inputs.version }}"
            git push
          fi

      - name: Record release commit
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release bundle
        run: python scripts/build_release.py --version "${{ inputs.version }}"

      - name: Upload platform bundle
        uses: actions/upload-artifact@v4
        with:
          name: yanka-${{ inputs.version }}-${{ matrix.label }}
          path: release/
          if-no-files-found: error

      - name: Upload sdist and wheel (Linux)
        if: matrix.label == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: yanka-${{ inputs.version }}-sdist
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: yanka-${{ inputs.version }}-*
          merge-multiple: true

      - name: Collect release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p upload
          # Homebrew formula expects this exact asset on the GitHub Release page.
          find artifacts -type f -name "yanka-${VERSION}.tar.gz" -exec cp -v {} upload/ \;
          find artifacts -type f -name "yanka-${VERSION}-py3-none-any.whl" -exec cp -v {} upload/ \;
          # Optional platform bundles (sdist + wheel also live inside each).
          find artifacts -type f -name "yanka-${VERSION}-*.tar.gz" ! -name "yanka-${VERSION}.tar.gz" -exec cp -v {} upload/ \;
          find artifacts -type f -name "yanka-${VERSION}-*.zip" -exec cp -v {} upload/ \;
          test -f "upload/yanka-${VERSION}.tar.gz"
          ls -la upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          name: yanka v${{ inputs.version }}
          draft: ${{ !inputs.publish }}
          generate_release_notes: true
          files: upload/*
